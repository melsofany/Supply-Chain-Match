kind = "web"
previewPath = "/"
title = "نظام التوريدات"
version = "1.0.0"
id = "artifacts/procurement"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18808

[services.development]
run = "pnpm --filter @workspace/procurement run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/procurement", "run", "build" ]
publicDir = "artifacts/procurement/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18808"
BASE_PATH = "/"
