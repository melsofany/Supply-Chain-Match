openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: General Supplies Procurement Management System
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: customers
    description: Customer management
  - name: suppliers
    description: Supplier management
  - name: inquiries
    description: Customer inquiry/need management
  - name: quotations
    description: Quotation management
  - name: customer-pos
    description: Customer purchase orders
  - name: supplier-pos
    description: Supplier purchase orders
  - name: delivery-notes
    description: Delivery notes management
  - name: invoices
    description: Customer invoices
  - name: reports
    description: Traceability and pipeline reports
  - name: dashboard
    description: Dashboard summaries
  - name: price-history
    description: Item pricing history and suggestions
  - name: accounting
    description: Accounting, cost analysis and P&L

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── CUSTOMERS ───────────────────────────────────────────────────────────────
  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List all customers
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a new customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get a customer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Not found
    patch:
      operationId: updateCustomer
      tags: [customers]
      summary: Update a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── SUPPLIERS ───────────────────────────────────────────────────────────────
  /suppliers:
    get:
      operationId: listSuppliers
      tags: [suppliers]
      summary: List all suppliers
      responses:
        "200":
          description: List of suppliers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supplier"
    post:
      operationId: createSupplier
      tags: [suppliers]
      summary: Create a new supplier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplierInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"

  /suppliers/{id}:
    get:
      operationId: getSupplier
      tags: [suppliers]
      summary: Get a supplier by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
        "404":
          description: Not found
    patch:
      operationId: updateSupplier
      tags: [suppliers]
      summary: Update a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplierUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
    delete:
      operationId: deleteSupplier
      tags: [suppliers]
      summary: Delete a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── INQUIRIES ───────────────────────────────────────────────────────────────
  /inquiries:
    get:
      operationId: listInquiries
      tags: [inquiries]
      summary: List all inquiries
      responses:
        "200":
          description: List of inquiries with items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InquiryWithItems"
    post:
      operationId: createInquiry
      tags: [inquiries]
      summary: Create a new inquiry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InquiryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inquiry"

  /inquiries/{id}:
    get:
      operationId: getInquiry
      tags: [inquiries]
      summary: Get an inquiry by ID (with items)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Inquiry with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InquiryWithItems"
        "404":
          description: Not found
    patch:
      operationId: updateInquiry
      tags: [inquiries]
      summary: Update an inquiry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InquiryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inquiry"
    delete:
      operationId: deleteInquiry
      tags: [inquiries]
      summary: Delete an inquiry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /inquiries/{id}/items:
    post:
      operationId: addInquiryItem
      tags: [inquiries]
      summary: Add an item to an inquiry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InquiryItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InquiryItem"

  /inquiries/{id}/items/{itemId}:
    patch:
      operationId: updateInquiryItem
      tags: [inquiries]
      summary: Update an inquiry item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InquiryItemUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InquiryItem"
    delete:
      operationId: deleteInquiryItem
      tags: [inquiries]
      summary: Delete an inquiry item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── QUOTATIONS ──────────────────────────────────────────────────────────────
  /quotations:
    get:
      operationId: listQuotations
      tags: [quotations]
      summary: List all quotations
      responses:
        "200":
          description: List of quotations with items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuotationWithItems"
    post:
      operationId: createQuotation
      tags: [quotations]
      summary: Create a new quotation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuotationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quotation"

  /quotations/{id}:
    get:
      operationId: getQuotation
      tags: [quotations]
      summary: Get a quotation by ID (with items)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quotation with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuotationWithItems"
        "404":
          description: Not found
    patch:
      operationId: updateQuotation
      tags: [quotations]
      summary: Update a quotation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuotationUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quotation"
    delete:
      operationId: deleteQuotation
      tags: [quotations]
      summary: Delete a quotation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /quotations/{id}/items:
    post:
      operationId: addQuotationItem
      tags: [quotations]
      summary: Add an item to a quotation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuotationItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuotationItem"

  /quotations/{id}/items/{itemId}:
    patch:
      operationId: updateQuotationItem
      tags: [quotations]
      summary: Update a quotation item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuotationItemUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuotationItem"
    delete:
      operationId: deleteQuotationItem
      tags: [quotations]
      summary: Delete a quotation item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /quotations/{id}/approve:
    post:
      operationId: approveQuotation
      tags: [quotations]
      summary: Mark a quotation as approved by the customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated quotation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quotation"

  /quotations/{id}/reject:
    post:
      operationId: rejectQuotation
      tags: [quotations]
      summary: Mark a quotation as rejected by the customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated quotation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quotation"

  # ─── CUSTOMER POs ─────────────────────────────────────────────────────────────
  /customer-pos:
    get:
      operationId: listCustomerPos
      tags: [customer-pos]
      summary: List all customer purchase orders
      responses:
        "200":
          description: List of customer POs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomerPo"
    post:
      operationId: createCustomerPo
      tags: [customer-pos]
      summary: Create a customer purchase order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerPoInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerPo"

  /customer-pos/{id}:
    get:
      operationId: getCustomerPo
      tags: [customer-pos]
      summary: Get a customer PO by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer PO
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerPo"
        "404":
          description: Not found
    patch:
      operationId: updateCustomerPo
      tags: [customer-pos]
      summary: Update a customer PO
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerPoUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerPo"

  # ─── SUPPLIER POs ─────────────────────────────────────────────────────────────
  /supplier-pos:
    get:
      operationId: listSupplierPos
      tags: [supplier-pos]
      summary: List all supplier purchase orders
      responses:
        "200":
          description: List of supplier POs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupplierPo"
    post:
      operationId: createSupplierPo
      tags: [supplier-pos]
      summary: Create a supplier purchase order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplierPoInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierPo"

  /supplier-pos/{id}:
    get:
      operationId: getSupplierPo
      tags: [supplier-pos]
      summary: Get a supplier PO by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Supplier PO
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierPo"
        "404":
          description: Not found
    patch:
      operationId: updateSupplierPo
      tags: [supplier-pos]
      summary: Update a supplier PO
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplierPoUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierPo"

  # ─── DELIVERY NOTES ───────────────────────────────────────────────────────────
  /delivery-notes:
    get:
      operationId: listDeliveryNotes
      tags: [delivery-notes]
      summary: List all delivery notes
      responses:
        "200":
          description: List of delivery notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeliveryNote"
    post:
      operationId: createDeliveryNote
      tags: [delivery-notes]
      summary: Create a delivery note for a customer PO
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliveryNoteInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryNote"

  /delivery-notes/{id}:
    get:
      operationId: getDeliveryNote
      tags: [delivery-notes]
      summary: Get a delivery note by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Delivery note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryNote"
        "404":
          description: Not found
    patch:
      operationId: updateDeliveryNote
      tags: [delivery-notes]
      summary: Update a delivery note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliveryNoteUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryNote"

  /delivery-notes/{id}/approve-finance:
    post:
      operationId: approveDeliveryNoteFinance
      tags: [delivery-notes]
      summary: Finance department approves the delivery note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryNote"

  /delivery-notes/{id}/mark-signed:
    post:
      operationId: markDeliveryNoteSigned
      tags: [delivery-notes]
      summary: Mark delivery note as signed by customer (with optional file URL)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkSignedInput"
      responses:
        "200":
          description: Signed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryNote"

  # ─── INVOICES ─────────────────────────────────────────────────────────────────
  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: List all invoices
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
    post:
      operationId: createInvoice
      tags: [invoices]
      summary: Create an invoice for a signed delivery note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      summary: Get an invoice by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "404":
          description: Not found
    patch:
      operationId: updateInvoice
      tags: [invoices]
      summary: Update an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  # ─── TRACEABILITY ──────────────────────────────────────────────────────────────
  /customer-pos/{id}/timeline:
    get:
      operationId: getCustomerPoTimeline
      tags: [customer-pos]
      summary: Full traceability chain for a customer PO
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Timeline chain
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoTimeline"
        "404":
          description: Not found

  /reports/pipeline:
    get:
      operationId: getPipelineReport
      tags: [reports]
      summary: Full pipeline traceability report
      responses:
        "200":
          description: Pipeline report rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PipelineReportRow"

  # ─── PRICE HISTORY ────────────────────────────────────────────────────────────
  /price-history:
    get:
      operationId: listPriceHistory
      tags: [price-history]
      summary: List item pricing history with optional search
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: Search by item description (case-insensitive partial match)
        - name: supplierId
          in: query
          schema:
            type: integer
          description: Filter by supplier
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of price history entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriceHistoryEntry"

  /price-history/suggestions:
    get:
      operationId: getPriceHistorySuggestions
      tags: [price-history]
      summary: Get pricing suggestions for an item description
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Item description to search for pricing history
      responses:
        "200":
          description: Price suggestions with smart warnings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceSuggestions"

  # ─── ACCOUNTING ────────────────────────────────────────────────────────────────
  /accounting/summary:
    get:
      operationId: getAccountingSummary
      tags: [accounting]
      summary: Overall accounting summary (revenue, cost, profit)
      responses:
        "200":
          description: Accounting summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountingSummary"

  /accounting/po-analysis:
    get:
      operationId: listPoAnalysis
      tags: [accounting]
      summary: List all supplier POs with full cost analysis
      responses:
        "200":
          description: List of PO analyses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PoAnalysis"

  /accounting/po-analysis/{supplierPoId}:
    get:
      operationId: getPoAnalysis
      tags: [accounting]
      summary: Get cost breakdown and P&L for a specific supplier PO
      parameters:
        - name: supplierPoId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: PO analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoAnalysis"
        "404":
          description: Not found

  # ─── DASHBOARD ────────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard pipeline summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Recent activity items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ─── CUSTOMER ──────────────────────────────────────────────────────────────
    Customer:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        contactName:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    CustomerInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        contactName:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        notes:
          type: string

    CustomerUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        contactName:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        notes:
          type: string

    # ─── SUPPLIER ──────────────────────────────────────────────────────────────
    Supplier:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        contactName:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    SupplierInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        contactName:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        category:
          type: string
        notes:
          type: string

    SupplierUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        contactName:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        category:
          type: string
        notes:
          type: string

    # ─── INQUIRY ───────────────────────────────────────────────────────────────
    Inquiry:
      type: object
      required: [id, customerId, title, status, createdAt]
      properties:
        id:
          type: integer
        customerId:
          type: integer
        customerName:
          type: ["string", "null"]
        title:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [new, in_progress, quoted, closed]
        createdAt:
          type: string
          format: date-time

    InquiryItem:
      type: object
      required: [id, inquiryId, description, quantity]
      properties:
        id:
          type: integer
        inquiryId:
          type: integer
        description:
          type: string
        partNo:
          type: ["string", "null"]
          description: رقم القطعة لدى المصنع (Manufacturer Part Number)
        customerInternalCode:
          type: ["string", "null"]
          description: الكود الداخلي للمنتج لدى العميل
        quantity:
          type: number
        unit:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    InquiryWithItems:
      type: object
      required: [id, customerId, title, status, createdAt, items]
      properties:
        id:
          type: integer
        customerId:
          type: integer
        customerName:
          type: ["string", "null"]
        inquiryNumber:
          type: ["string", "null"]
          description: رقم الطلب
        title:
          type: string
        description:
          type: ["string", "null"]
        buyerName:
          type: ["string", "null"]
          description: اسم المشتري / الموظف المسؤل لدى العميل
        replyDeadline:
          type: ["string", "null"]
          description: آخر تاريخ للرد على الطلب
        status:
          type: string
          enum: [new, in_progress, quoted, closed]
        createdAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: "#/components/schemas/InquiryItem"

    InquiryInput:
      type: object
      required: [customerId, title]
      properties:
        customerId:
          type: integer
        inquiryNumber:
          type: string
        title:
          type: string
          minLength: 1
        description:
          type: string
        buyerName:
          type: string
        replyDeadline:
          type: string
        status:
          type: string
          enum: [new, in_progress, quoted, closed]

    InquiryUpdate:
      type: object
      properties:
        inquiryNumber:
          type: string
        title:
          type: string
          minLength: 1
        description:
          type: string
        buyerName:
          type: string
        replyDeadline:
          type: string
        status:
          type: string
          enum: [new, in_progress, quoted, closed]

    InquiryItemInput:
      type: object
      required: [description, quantity]
      properties:
        description:
          type: string
          minLength: 1
        partNo:
          type: string
        customerInternalCode:
          type: string
        quantity:
          type: number
        unit:
          type: string
        notes:
          type: string

    InquiryItemUpdate:
      type: object
      properties:
        description:
          type: string
          minLength: 1
        partNo:
          type: string
        customerInternalCode:
          type: string
        quantity:
          type: number
        unit:
          type: string
        notes:
          type: string

    # ─── QUOTATION ─────────────────────────────────────────────────────────────
    Quotation:
      type: object
      required: [id, inquiryId, customerId, status, createdAt]
      properties:
        id:
          type: integer
        inquiryId:
          type: integer
        customerId:
          type: integer
        customerName:
          type: ["string", "null"]
        quotationNumber:
          type: ["string", "null"]
        status:
          type: string
          enum: [draft, sent, approved, rejected]
        totalAmount:
          type: ["number", "null"]
        validUntil:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    QuotationItem:
      type: object
      required: [id, quotationId, description, quantity, unitPrice]
      properties:
        id:
          type: integer
        quotationId:
          type: integer
        supplierId:
          type: ["integer", "null"]
        supplierName:
          type: ["string", "null"]
        description:
          type: string
        quantity:
          type: number
        unit:
          type: ["string", "null"]
        unitPrice:
          type: number
        totalPrice:
          type: number
        notes:
          type: ["string", "null"]

    QuotationWithItems:
      type: object
      required: [id, inquiryId, customerId, status, createdAt, items]
      properties:
        id:
          type: integer
        inquiryId:
          type: integer
        customerId:
          type: integer
        customerName:
          type: ["string", "null"]
        quotationNumber:
          type: ["string", "null"]
        status:
          type: string
          enum: [draft, sent, approved, rejected]
        totalAmount:
          type: ["number", "null"]
        validUntil:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: "#/components/schemas/QuotationItem"

    QuotationInput:
      type: object
      required: [inquiryId, customerId]
      properties:
        inquiryId:
          type: integer
        customerId:
          type: integer
        quotationNumber:
          type: string
        status:
          type: string
          enum: [draft, sent, approved, rejected]
        totalAmount:
          type: number
        validUntil:
          type: string
        notes:
          type: string

    QuotationUpdate:
      type: object
      properties:
        quotationNumber:
          type: string
        status:
          type: string
          enum: [draft, sent, approved, rejected]
        totalAmount:
          type: number
        validUntil:
          type: string
        notes:
          type: string

    QuotationItemInput:
      type: object
      required: [description, quantity, unitPrice]
      properties:
        supplierId:
          type: integer
        description:
          type: string
          minLength: 1
        quantity:
          type: number
        unit:
          type: string
        unitPrice:
          type: number
        notes:
          type: string

    QuotationItemUpdate:
      type: object
      properties:
        supplierId:
          type: integer
        description:
          type: string
          minLength: 1
        quantity:
          type: number
        unit:
          type: string
        unitPrice:
          type: number
        notes:
          type: string

    # ─── DELIVERY NOTES ────────────────────────────────────────────────────────
    DeliveryNote:
      type: object
      required: [id, dnNumber, customerPoId, status, createdAt]
      properties:
        id:
          type: integer
        dnNumber:
          type: string
        customerPoId:
          type: integer
        customerPoNumber:
          type: ["string", "null"]
        customerName:
          type: ["string", "null"]
        status:
          type: string
          enum: [draft, pending_finance, finance_approved, delivered, signed, cancelled]
        issueDate:
          type: ["string", "null"]
        signedFileUrl:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        financeApprovedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        invoice:
          nullable: true
          $ref: "#/components/schemas/InvoiceSummary"

    DeliveryNoteInput:
      type: object
      required: [customerPoId]
      properties:
        customerPoId:
          type: integer
        issueDate:
          type: string
        notes:
          type: string

    DeliveryNoteUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [draft, pending_finance, finance_approved, delivered, signed, cancelled]
        issueDate:
          type: string
        signedFileUrl:
          type: string
        notes:
          type: string

    MarkSignedInput:
      type: object
      properties:
        signedFileUrl:
          type: string

    # ─── INVOICE ───────────────────────────────────────────────────────────────
    Invoice:
      type: object
      required: [id, invoiceNumber, deliveryNoteId, customerPoId, status, createdAt]
      properties:
        id:
          type: integer
        invoiceNumber:
          type: string
        deliveryNoteId:
          type: integer
        customerPoId:
          type: integer
        customerPoNumber:
          type: ["string", "null"]
        customerName:
          type: ["string", "null"]
        dnNumber:
          type: ["string", "null"]
        status:
          type: string
          enum: [draft, issued, paid, cancelled]
        issueDate:
          type: ["string", "null"]
        totalAmount:
          type: ["number", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    InvoiceSummary:
      type: object
      required: [id, invoiceNumber, status]
      properties:
        id:
          type: integer
        invoiceNumber:
          type: string
        status:
          type: string

    InvoiceInput:
      type: object
      required: [deliveryNoteId]
      properties:
        deliveryNoteId:
          type: integer
        issueDate:
          type: string
        totalAmount:
          type: number
        notes:
          type: string

    InvoiceUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [draft, issued, paid, cancelled]
        issueDate:
          type: string
        totalAmount:
          type: number
        notes:
          type: string

    # ─── TRACEABILITY ──────────────────────────────────────────────────────────
    PoTimeline:
      type: object
      required: [customerPoId]
      properties:
        customerPoId:
          type: integer
        customerPoNumber:
          type: ["string", "null"]
        customerName:
          type: ["string", "null"]
        quotationId:
          type: ["integer", "null"]
        quotationNumber:
          type: ["string", "null"]
        deliveryNotes:
          type: array
          items:
            $ref: "#/components/schemas/DeliveryNote"
        invoices:
          type: array
          items:
            $ref: "#/components/schemas/Invoice"

    PipelineReportRow:
      type: object
      required: [customerPoId, customerPoStatus, createdAt]
      properties:
        customerPoId:
          type: integer
        customerPoNumber:
          type: ["string", "null"]
        customerPoStatus:
          type: string
        customerName:
          type: ["string", "null"]
        quotationId:
          type: ["integer", "null"]
        quotationNumber:
          type: ["string", "null"]
        totalAmount:
          type: ["number", "null"]
        dnId:
          type: ["integer", "null"]
        dnNumber:
          type: ["string", "null"]
        dnStatus:
          type: ["string", "null"]
        invoiceId:
          type: ["integer", "null"]
        invoiceNumber:
          type: ["string", "null"]
        invoiceStatus:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    # ─── CUSTOMER PO ───────────────────────────────────────────────────────────
    CustomerPo:
      type: object
      required: [id, customerId, status, createdAt]
      properties:
        id:
          type: integer
        customerId:
          type: integer
        customerName:
          type: ["string", "null"]
        quotationId:
          type: ["integer", "null"]
        poNumber:
          type: ["string", "null"]
        status:
          type: string
          enum: [received, processing, fulfilled, cancelled]
        totalAmount:
          type: ["number", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    CustomerPoInput:
      type: object
      required: [customerId]
      properties:
        customerId:
          type: integer
        quotationId:
          type: integer
        poNumber:
          type: string
        status:
          type: string
          enum: [received, processing, fulfilled, cancelled]
        totalAmount:
          type: number
        notes:
          type: string

    CustomerPoUpdate:
      type: object
      properties:
        poNumber:
          type: string
        status:
          type: string
          enum: [received, processing, fulfilled, cancelled]
        totalAmount:
          type: number
        notes:
          type: string

    # ─── SUPPLIER PO ───────────────────────────────────────────────────────────
    SupplierPo:
      type: object
      required: [id, supplierId, status, taxInsuranceRate, operatingCost, createdAt]
      properties:
        id:
          type: integer
        supplierId:
          type: integer
        supplierName:
          type: ["string", "null"]
        customerPoId:
          type: ["integer", "null"]
        poNumber:
          type: ["string", "null"]
        status:
          type: string
          enum: [draft, sent, confirmed, delivered, cancelled]
        totalAmount:
          type: ["number", "null"]
        taxInsuranceRate:
          type: number
          description: Rate for tax + insurance (default 0.03 = 3%)
        operatingCost:
          type: number
          description: Additional operating costs
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    SupplierPoInput:
      type: object
      required: [supplierId]
      properties:
        supplierId:
          type: integer
        customerPoId:
          type: integer
        poNumber:
          type: string
        status:
          type: string
          enum: [draft, sent, confirmed, delivered, cancelled]
        totalAmount:
          type: number
        taxInsuranceRate:
          type: number
        operatingCost:
          type: number
        notes:
          type: string

    SupplierPoUpdate:
      type: object
      properties:
        poNumber:
          type: string
        status:
          type: string
          enum: [draft, sent, confirmed, delivered, cancelled]
        totalAmount:
          type: number
        taxInsuranceRate:
          type: number
        operatingCost:
          type: number
        notes:
          type: string

    # ─── PRICE HISTORY ─────────────────────────────────────────────────────────
    PriceSuggestions:
      type: object
      required: [query, entries, hasWarning]
      properties:
        query:
          type: string
        hasWarning:
          type: boolean
          description: True if a previous quotation at higher price did not result in a PO
        warningMessage:
          type: ["string", "null"]
        lowestSuccessfulPrice:
          type: ["number", "null"]
          description: Lowest price that actually resulted in a PO
        highestFailedPrice:
          type: ["number", "null"]
          description: Highest price that did NOT result in a PO (competitor probably beat it)
        suggestedMaxPrice:
          type: ["number", "null"]
          description: Suggested ceiling price (below the highest failed price)
        entries:
          type: array
          items:
            $ref: "#/components/schemas/PriceHistoryEntry"

    PriceHistoryEntry:
      type: object
      required: [id, itemDescription, unitPrice, resultedInPo, createdAt]
      properties:
        id:
          type: integer
        itemDescription:
          type: string
        supplierId:
          type: ["integer", "null"]
        supplierName:
          type: ["string", "null"]
        customerId:
          type: ["integer", "null"]
        customerName:
          type: ["string", "null"]
        quotationId:
          type: ["integer", "null"]
        unitPrice:
          type: number
        quantity:
          type: ["number", "null"]
        unit:
          type: ["string", "null"]
        resultedInPo:
          type: boolean
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

  # ─── ACCOUNTING ─────────────────────────────────────────────────────────────
    PoAnalysis:
      type: object
      required: [supplierPoId, supplierPoNumber, supplierId, supplierName, status, grossCost, taxInsuranceRate, taxInsuranceAmount, operatingCost, totalCost, createdAt]
      properties:
        supplierPoId:
          type: integer
        supplierPoNumber:
          type: ["string", "null"]
        supplierId:
          type: integer
        supplierName:
          type: ["string", "null"]
        customerPoId:
          type: ["integer", "null"]
        customerPoNumber:
          type: ["string", "null"]
        status:
          type: string
        grossCost:
          type: number
          description: Supplier PO totalAmount (before tax/insurance/operating costs)
        taxInsuranceRate:
          type: number
          description: Rate for tax + insurance (e.g. 0.03 = 3%)
        taxInsuranceAmount:
          type: number
          description: grossCost * taxInsuranceRate
        operatingCost:
          type: number
          description: Manual operating costs added to this PO
        totalCost:
          type: number
          description: grossCost + taxInsuranceAmount + operatingCost
        revenue:
          type: ["number", "null"]
          description: Linked customer PO amount (selling price to customer)
        profit:
          type: ["number", "null"]
          description: revenue - totalCost
        profitMargin:
          type: ["number", "null"]
          description: profit / revenue * 100
        createdAt:
          type: string
          format: date-time

    AccountingSummary:
      type: object
      required: [totalRevenue, totalCost, totalProfit, avgProfitMargin, fulfilledCount, totalTaxInsurance, totalOperatingCost]
      properties:
        totalRevenue:
          type: number
        totalCost:
          type: number
        totalProfit:
          type: number
        avgProfitMargin:
          type: number
        fulfilledCount:
          type: integer
        totalTaxInsurance:
          type: number
        totalOperatingCost:
          type: number

  # ─── DASHBOARD ─────────────────────────────────────────────────────────────
    DashboardSummary:
      type: object
      required: [totalCustomers, totalSuppliers, openInquiries, pendingQuotations, activeCustomerPos, activeSupplierPos, totalRevenue]
      properties:
        totalCustomers:
          type: integer
        totalSuppliers:
          type: integer
        openInquiries:
          type: integer
        pendingQuotations:
          type: integer
        activeCustomerPos:
          type: integer
        activeSupplierPos:
          type: integer
        totalRevenue:
          type: number
        inquiryStatusBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/StatusCount"
        quotationStatusBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/StatusCount"

    StatusCount:
      type: object
      required: [status, count]
      properties:
        status:
          type: string
        count:
          type: integer

    ActivityItem:
      type: object
      required: [id, type, title, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [inquiry, quotation, customer_po, supplier_po, customer, supplier]
        title:
          type: string
        subtitle:
          type: ["string", "null"]
        status:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
